name: Build & Publish Add-on

on:
  push:
    branches: [main]
    paths:
      - 'cinexis_remote/**'
      - '.github/workflows/build.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cinexisin/cinexis-remote-access

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            build_from: ghcr.io/home-assistant/amd64-base:3.20
            platform: linux/amd64
          - arch: aarch64
            build_from: ghcr.io/home-assistant/aarch64-base:3.20
            platform: linux/arm64
          - arch: armv7
            build_from: ghcr.io/home-assistant/armv7-base:3.20
            platform: linux/arm/v7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^version:' cinexis_remote/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION for ${{ matrix.arch }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch }}
        uses: docker/build-push-action@v5
        with:
          context: ./cinexis_remote
          file: ./cinexis_remote/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_ARCH=${{ matrix.arch }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.arch }}:latest
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          labels: |
            org.opencontainers.image.title=Cinexis Remote Access (${{ matrix.arch }})
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ env.IMAGE_NAME }}

  update-config:
    name: Update config with image refs
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^version:' cinexis_remote/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update build.yaml with built image refs
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cat > cinexis_remote/build.yaml << EOF
          build_from:
            amd64: "ghcr.io/${{ env.IMAGE_NAME }}/amd64:${VERSION}"
            aarch64: "ghcr.io/${{ env.IMAGE_NAME }}/aarch64:${VERSION}"
            armv7: "ghcr.io/${{ env.IMAGE_NAME }}/armv7:${VERSION}"
          labels:
            org.opencontainers.image.title: "Cinexis Remote Access"
            org.opencontainers.image.description: "Secure remote access via Cinexis Cloud"
            org.opencontainers.image.source: "https://github.com/${{ env.IMAGE_NAME }}"
            org.opencontainers.image.licenses: "Proprietary"
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Cinexis Remote Access v${{ steps.version.outputs.version }}
          body: |
            ## Cinexis Remote Access v${{ steps.version.outputs.version }}

            Pre-built images available for all architectures:
            - `amd64` → `ghcr.io/${{ env.IMAGE_NAME }}/amd64:${{ steps.version.outputs.version }}`
            - `aarch64` → `ghcr.io/${{ env.IMAGE_NAME }}/aarch64:${{ steps.version.outputs.version }}`
            - `armv7` → `ghcr.io/${{ env.IMAGE_NAME }}/armv7:${{ steps.version.outputs.version }}`
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
