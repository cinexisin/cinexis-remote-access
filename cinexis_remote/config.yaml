name: "Cinexis Remote Access"
description: "Secure remote access to your Home Assistant via Cinexis Cloud. No port forwarding required."
version: "1.2.0"
slug: "cinexis_remote"
init: false
arch:
  - amd64
  - aarch64
  - armv7
homeassistant: "2023.1.0"
startup: services
boot: auto
apparmor: true
map:
  - type: share
    read_only: false
options:
  log_level: info
  name_prefix: ""
schema:
  log_level: list(trace|debug|info|warning|error)
  name_prefix: str
url: "https://cinexis.cloud"
