name: "Cinexis Remote Access"
description: "Secure remote access and Alexa Smart Home for Home Assistant via Cinexis Cloud. No port forwarding required."
version: "1.8.3"
slug: "cinexis_remote"
init: false
arch:
  - amd64
  - aarch64
  - armv7
image: "ghcr.io/cinexisin/cinexis-remote-access/{arch}"
homeassistant: "2023.1.0"
startup: services
boot: auto
apparmor: true
ingress: true
ingress_port: 18082
panel_icon: mdi:cloud-lock
panel_title: Cinexis
homeassistant_api: true
hassio_api: true
map:
  - type: share
    read_only: false
options:
  log_level: info
  name_prefix: ""
schema:
  log_level: list(trace|debug|info|warning|error)
  name_prefix: str
url: "https://cinexis.cloud"
